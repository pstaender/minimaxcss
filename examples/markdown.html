        </form>
        <article id="output"></article>
        <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

          const updateHtml = (ev, text = null) => {
            if (text !== null) {
              textarea.value = text;
            }
            if (textarea.value?.trim()) {
              sessionStorage.setItem(localStorageKey, textarea.value);
            }

            document.querySelector("main #output").innerHTML =
              `<article>${marked.parse(textarea.value)}</article>`;
            let title = document
              .querySelector("main #output")
              .querySelector("h1,h2,h3,h4,h5,h6")?.textContent;
            if (title) {
              document.title = title;
            }
          };
          textarea.addEventListener("keyup", updateHtml);

          function enableAndDisableCSS(value) {
            const serif = document.querySelector(
              `link[href*="minimax-serif.css"]`,
            );
            const alternate = document.querySelector(
              `link[href*="minimax-alternate-fonts.css"]`,
            );
            serif.disabled = true;
            alternate.disabled = true;
            if (value.match(/serif/)) {
              serif.disabled = false;
            }
            if (value.match(/alternate/)) {
              alternate.disabled = false;
            }
          }

          document.querySelector("#font").addEventListener("change", (ev) => {
            enableAndDisableCSS(ev.target.value);
          });
          updateHtml(
            null,
            sessionStorage.getItem(localStorageKey) || defaultText,
          );
          enableAndDisableCSS(document.querySelector("#font").value);
        </script>
        <style>
          #demo {
            padding: 1rem;
            textarea {
              width: 100%;
              min-height: 8em;
              /*resize: none;*/
            }
          }
          #font-check {
            padding: 2px 4px;
            box-shadow: none;
            background: #888;
            color: #fff;
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.6rem;
            border-radius: var(--border-radius);
            select {
              padding: 2px 4px;
            }

            @media screen and (min-width: 900px) {
              box-shadow: var(--box-shadow);
              padding: var(--space);
              border-radius: 10px;
              font-size: 1rem;
              background: #fff;
              color: #000;
              font-size: var(--font-size-small);
            }
          }
          @media print {
            #demo form {
              display: none;
            }
          }
        </style>
