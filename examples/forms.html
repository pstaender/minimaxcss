<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>form</title>
    <link rel="stylesheet" href="../minimax.css" />
    <script src="../minimax.mjs" type="module"></script>
  </head>

  <body>
    <main
      style="
        --max-readable-width: 50rem;
        max-width: var(--max-readable-width);
        margin: 0 auto;
      "
    >
      <section>
        <h1>Forms</h1>
        <form action="" method="get" class="form">
          <section>
            <section>
              <label for="name">Enter your zip code: </label>
              <input
                type="text"
                name="zipcode"
                id="zipcode"
                placeholder="e.g. 51061"
                pattern="\d{3,6}"
              />
            </section>
            <section>
              <label for="email">Enter your email: </label>
              <input
                type="email"
                name="email"
                id="email"
                required
                placeholder="me@example.com"
              />
            </section>
            <section>
              <label for="color">Color: </label>
              <input type="color" name="color" id="color" />
            </section>
            <section>
              <label for="date">Date and Time:</label>
              <input type="datetime-local" name="date" id="date" />
            </section>
            <section>
              <label for="file">File:</label>
              <input type="file" name="file" id="file" />
            </section>
            <section>
              <label for="number">Number:</label>
              <input type="number" name="number" id="number" />
            </section>
            <section>
              <label for="password">Password:</label>
              <input type="password" name="password" id="password" />
            </section>
            <section>
              <label for="range">Range:</label>
              <input type="range" name="range" id="range" />
            </section>
            <section>
              <label for="search">Search:</label>
              <input
                type="search"
                name="search"
                id="search"
                placeholder="Enter search term"
              />
            </section>
            <section>
              <label for="time">Time:</label>
              <input type="time" name="time" id="time" />
            </section>
            <section>
              <label for="time">Url:</label>
              <input type="time" name="time" id="time" />
            </section>
            <section>
              <label for="week">Week:</label>
              <input type="week" name="week" id="week" />
            </section>

            <fieldset>
              <legend>Choose your favorite monster</legend>

              <section>
                <input type="radio" id="kraken" name="monster" value="K" />
                <label for="kraken">Kraken</label>
              </section>

              <section>
                <input type="radio" id="sasquatch" name="monster" value="S" />
                <label for="sasquatch">Sasquatch</label>
              </section>

              <section>
                <input type="radio" id="mothman" name="monster" value="M" />
                <label for="mothman">Mothman</label>
              </section>
            </fieldset>
            <fieldset>
              <legend>Do you agree?</legend>
              <section>
                <input type="checkbox" id="chbx" name="agree" value="Yes!" />
                <label for="chbx">I agree</label>
              </section>
            </fieldset>
            <section>
              <label for="choice">Your Choice:</label>
              <select name="choice" id="choice">
                <option value="first">First Value</option>
                <option value="second" selected>Second Value</option>
                <option value="third">Third Value</option>
              </select>
            </section>
            <section>
              <label for="hr-select">Your favorite food:</label>
              <select name="foods" id="hr-select" required>
                <option value="">Choose a food</option>
                <hr />
                <optgroup label="Fruit">
                  <option value="apple">Apples</option>
                  <option value="banana">Bananas</option>
                  <option value="cherry">Cherries</option>
                  <option value="damson">Damsons</option>
                </optgroup>
                <hr />
                <optgroup label="Vegetables">
                  <option value="artichoke">Artichokes</option>
                  <option value="broccoli">Broccoli</option>
                  <option value="cabbage">Cabbages</option>
                </optgroup>
                <hr />
                <optgroup label="Meat">
                  <option value="beef">Beef</option>
                  <option value="chicken">Chicken</option>
                  <option value="pork">Pork</option>
                </optgroup>
                <hr />
                <optgroup label="Fish">
                  <option value="cod">Cod</option>
                  <option value="haddock">Haddock</option>
                  <option value="salmon">Salmon</option>
                  <option value="turbot">Turbot</option>
                </optgroup>
              </select>
            </section>
            <section>
              <label for="comment">Comment:</label>
              <textarea id="comment" autoheight></textarea>
            </section>
            <footer>
              <input type="reset" />
              <input type="submit" />
            </footer>
          </section>
        </form>
      </section>
    </main>
  </body>
</html>
