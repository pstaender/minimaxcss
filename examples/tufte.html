<!-- https://rstudio.github.io/tufte/ -->
<!-- https://edwardtufte.github.io/et-book/ -->
<!-- https://quarto-dev.github.io/quarto-gallery/page-layout/tufte.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>tufte example</title>
    <link rel="stylesheet" href="../minimax.css" />
    <link rel="stylesheet" href="../minimax-din-a4.css" />
    <link rel="stylesheet" href="../minimax-serif.css" />
    <link rel="stylesheet" href="../minimax-tufte.css" />
  </head>

  <body>
    <main>
      <section></section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-footnote/dist/index.umd.min.js"></script>
    <script type="module">
      (async () => {
        document.querySelector("main section").innerHTML += new marked.Marked()
          .use(markedFootnote())
          .parse(await fetch("./tufte1.md").then((res) => res.text()));
        document.querySelectorAll("main section sup > a").forEach((a) => {
          let div = document.createElement("div");
          div.classList.add("sidenote");
          div.innerHTML = document.querySelector(
            a.getAttribute("href"),
          ).innerHTML;
          div.dataset.index = a.textContent;
          div.querySelector("a[data-footnote-backref]")?.remove();
          a.after(div);
        });
      })();
    </script>
    <style>
      :root {
        @media screen and (max-width: 1200px) {
          .sidenote {
            display: none;
          }
          --sidenote-position: relative;
          --sidenote-font-size: 1rem;
          --sidenote-right-position: unset;
          --main-column-width: 100%;
          --column-gap: 0;
        }
      }
      sup a[data-footnote-ref] {
        color: currentColor;
        text-decoration: none;
        padding-left: 0.25em;
        font-family: var(--side-note-font-family);
        font-size: 0.8em;
      }
    </style>
  </body>
</html>
